# ============================================================
# AlgoArena - Algorithm Competition Learning Platform
# Docker Compose - Development & Production
# ============================================================
# Usage:
#   Development:  docker compose up -d
#   Production:   docker compose --profile production up -d
#   Migration:    docker compose --profile migration run db-migrate
#   Stop:         docker compose down
#   Logs:         docker compose logs -f [service]
#   Reset:        docker compose down -v && docker compose up -d
# ============================================================

services:
  # ============================================================
  # PostgreSQL 16 - Primary Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: algo-arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-algo_arena}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-algo_arena}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - algo-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================================
  # Redis 7 - Caching and Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: algo-arena-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ============================================================
  # Backend API - Express.js + Prisma
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: algo-arena-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-algo_arena}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - algo-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================================
  # Server - Gamification & OJ Services
  # ============================================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: algo-arena-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-algo_arena}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - algo-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================================
  # Frontend - React + Vite (Nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: algo-arena-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - algo-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # ============================================================
  # Nginx Reverse Proxy (Production only)
  # ============================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: algo-arena-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - server
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "443:443"
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - algo-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    profiles:
      - production

  # ============================================================
  # pgAdmin (Development only)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: algo-arena-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@algo-arena.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - algo-network
    profiles:
      - tools

  # ============================================================
  # Redis Commander (Development only)
  # ============================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: algo-arena-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - algo-network
    profiles:
      - tools

  # ============================================================
  # Database Migration (Run on demand)
  # ============================================================
  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: algo-arena-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-algo_arena}?schema=public
    command: ["npx", "prisma", "migrate", "deploy"]
    networks:
      - algo-network
    profiles:
      - migration

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  algo-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
