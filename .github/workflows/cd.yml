# ============================================================
# AlgoArena CD Pipeline - Build Images & Deploy
# ============================================================
name: CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/algo-arena

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ==================== Build & Push Images ====================
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [frontend, backend, server]
        include:
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - component: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - component: server
            context: ./server
            dockerfile: ./server/Dockerfile
    outputs:
      frontend-tag: ${{ steps.meta.outputs.version }}
      backend-tag: ${{ steps.meta.outputs.version }}
      server-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # ==================== Deploy to Staging ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.algo-arena.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags
        run: |
          cd deploy/kubernetes
          sed -i "s|image: algo-arena-backend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}|g" backend.yaml
          sed -i "s|image: algo-arena-server:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:${{ github.sha }}|g" server.yaml
          sed -i "s|image: algo-arena-frontend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}|g" frontend.yaml

      - name: Deploy to staging
        run: |
          kubectl apply -f deploy/kubernetes/namespace.yaml
          kubectl apply -f deploy/kubernetes/configmap.yaml
          kubectl apply -f deploy/kubernetes/secrets.yaml
          kubectl apply -f deploy/kubernetes/postgres.yaml
          kubectl apply -f deploy/kubernetes/redis.yaml
          kubectl apply -f deploy/kubernetes/backend.yaml
          kubectl apply -f deploy/kubernetes/server.yaml
          kubectl apply -f deploy/kubernetes/frontend.yaml
          kubectl apply -f deploy/kubernetes/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n algo-arena --timeout=300s
          kubectl rollout status deployment/server -n algo-arena --timeout=300s
          kubectl rollout status deployment/frontend -n algo-arena --timeout=300s

      - name: Run smoke tests
        run: |
          STAGING_URL="https://staging.algo-arena.example.com"
          echo "Testing health endpoints..."
          curl -sf "$STAGING_URL/api/health" || exit 1
          echo "Smoke tests passed!"

  # ==================== Deploy to Production ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://algo-arena.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Update image tags
        run: |
          cd deploy/kubernetes
          sed -i "s|image: algo-arena-backend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}|g" backend.yaml
          sed -i "s|image: algo-arena-server:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:${{ github.sha }}|g" server.yaml
          sed -i "s|image: algo-arena-frontend:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}|g" frontend.yaml

      - name: Deploy to production
        run: |
          kubectl apply -f deploy/kubernetes/namespace.yaml
          kubectl apply -f deploy/kubernetes/configmap.yaml
          kubectl apply -f deploy/kubernetes/secrets.yaml
          kubectl apply -f deploy/kubernetes/postgres.yaml
          kubectl apply -f deploy/kubernetes/redis.yaml
          kubectl apply -f deploy/kubernetes/backend.yaml
          kubectl apply -f deploy/kubernetes/server.yaml
          kubectl apply -f deploy/kubernetes/frontend.yaml
          kubectl apply -f deploy/kubernetes/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n algo-arena --timeout=300s
          kubectl rollout status deployment/server -n algo-arena --timeout=300s
          kubectl rollout status deployment/frontend -n algo-arena --timeout=300s

      - name: Verify deployment
        run: |
          echo "Checking pod status..."
          kubectl get pods -n algo-arena
          echo "Checking services..."
          kubectl get svc -n algo-arena
          echo "Deployment verified!"
