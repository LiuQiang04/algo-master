# ============================================================
# RBAC - Role-Based Access Control
# ============================================================
# Service account for the application
apiVersion: v1
kind: ServiceAccount
metadata:
  name: algo-arena-app
  namespace: algo-arena
---
# Role for application pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: algo-arena-app-role
  namespace: algo-arena
rules:
  # Allow reading configmaps and secrets (for config)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Allow reading pods (for service discovery)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# Bind role to service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: algo-arena-app-binding
  namespace: algo-arena
subjects:
  - kind: ServiceAccount
    name: algo-arena-app
    namespace: algo-arena
roleRef:
  kind: Role
  name: algo-arena-app-role
  apiGroup: rbac.authorization.k8s.io
---
# Role for CI/CD deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: algo-arena-deploy-role
  namespace: algo-arena
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
# Bind deploy role to CI service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: algo-arena-deploy-binding
  namespace: algo-arena
subjects:
  - kind: ServiceAccount
    name: algo-arena-deployer
    namespace: algo-arena
roleRef:
  kind: Role
  name: algo-arena-deploy-role
  apiGroup: rbac.authorization.k8s.io
---
# Pod Security Standards - Restricted
apiVersion: v1
kind: Namespace
metadata:
  name: algo-arena
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
