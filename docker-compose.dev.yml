# 简化版：只启动数据库和Redis
services:
  postgres:
    image: postgres:16-alpine
    container_name: algo-arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: algo_arena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: algo-arena-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
